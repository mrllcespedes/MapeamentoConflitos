  <style>
  .mapboxgl-popup {
    max-width: 400px;
    font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;

    opacity: 0.9;

  #mySidebar {
    background: #fff;
    position: relative;
    opacity: 0.85;
    z-index: 1;
    top: 78px;
    left: 7px;
    border-radius: 3px;
    height: 100%;
    width: 200px;
    overflow-x: hidden; /* Disable horizontal scroll */
    padding-top: 5px; /* Place content 60px from the top */
    transition: 0.5s; /* 0.5 second transition effect to slide in the sidebar */
    border: 0;
    font-family: 'Open Sans', sans-serif;
  }
  
  #mySidebar a {
    font-size: 13px;
    color: #404040;
    display: block;
    margin: 0;
    padding: 10px;
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    text-align: center;
    transition: 0.3s;
  }
  
  #mySidebar a:last-child {
    border: none;
  }
  
  #mySidebar a:hover {
    background-color: #f8f8f8;
    color: #404040;
  }
  
  #mySidebar a.active {
    background-color: #2F4F4F;
    color: #ffffff;
  }
  
  #mySidebar a.active:hover {
    background: #708090;
  }

  /* The button used to open the sidebar */
  .openbtn {
    font-size: 20px;
    cursor: pointer;
    background-color: #fff;
    opacity: 0.85;
    color: black;
    padding: 10px 15px;
    border: none;
    position:absolute; 
    width: 50px;
    top:31px; 
    left:7px; 
    z-index:1;
    border-radius: 3px;
  }

  .openbtn:hover {

  }

  .sidebar, .submenu {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .sidebar li:hover .submenu,
  .submenu-opened {
    display: block;
    max-height: 500px !important;
	  line-height: 1;
  }

  .submenu a {
    background-color: #999;
  }

  /* hover behaviour for links inside .submenu */
  .submenu a:hover {
    background-color: #666;
  }

  /* this is the initial state of all submenus.
    we set it to max-height: 0, and hide the overflowed content.
  */
  .submenu {
    overflow: hidden;
    max-height: 0;
    -webkit-transition: all 0.5s ease-out;
  }

</style>

	  document.getElementById('fly').addEventListener('click', function() {

    // PopUps ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    map.on("click", function (e) {
      var features = map.queryRenderedFeatures(e.point, {

      var popup = new mapboxgl.Popup({ offset: [0, -15] })

        .setHTML(

            feature.properties.NOME +

    // Change the cursor to a pointer when the mouse is over the states layer.

    // PopUps ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    map.on("load", function () {
      // When a click event occurs on a feature in the states layer, open a popup at the
      // location of the click, with description HTML from its properties.

      });

      // Change the cursor to a pointer when the mouse is over the states layer.

      });

      // Change it back to a pointer when it leaves.
      map.on("mouseleave", "UCs Federais", function () {
        map.getCanvas().style.cursor = "";
      });
    });
	map.on("load", function () {
      // When a click event occurs on a feature in the states layer, open a popup at the
      // location of the click, with description HTML from its properties.
      map.on("click", "UCs Estaduais", function (e) {
        new mapboxgl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(
            "<h3>" +
              e.features[0].properties.nome +
              "</h3>"
          )
          .addTo(map);
      });

      // Change the cursor to a pointer when the mouse is over the states layer.

    });

    map.on("load", function () {
      // When a click event occurs on a feature in the states layer, open a popup at the
      // location of the click, with description HTML from its properties.
      map.on("click", "Area de estudo", function (e) {
        new mapboxgl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(
          "<h3>" +
            e.features[0].properties.NOME +
            "</h3><p><b>Região:</b> " +
            e.features[0].properties.Regiao_RJ +
            "</p></p><b>População estimada (Ano de 2019, IBGE):</b> " +
            e.features[0].properties.Pop_Est_19 +
            "</p>"
        )
          .addTo(map);
      });

      // Change the cursor to a pointer when the mouse is over the states layer.
      map.on("mouseenter", "Area de estudo", function () {
        map.getCanvas().style.cursor = "pointer";
      });

      // Change it back to a pointer when it leaves.
      map.on("mouseleave", "Area de estudo", function () {
        map.getCanvas().style.cursor = "";
      });
    });

    // Vinculador  ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    // enumerate ids of the layers
    var toggleableLayerIds = [
      {
        label: "Área de estudo",
        layer: "Area de estudo"
      },
	  {
        label: "RJ – Limite estadual",
        layer: "Limite estadual"
      },
      {
        label: "Conflitos ambientais",
        layer: "Conflitos ambientais"
      },
	        {
        label: "Concentração espacial de conflitos ambientais",
        layer: "Conflitos ambientais MC"
      },
	  	        {
        label: "Entidades de pesca",
        layer: "Entidades pesca"
      },
	  	  	        {
        label: "Concentração espacial de entidades de pesca",
        layer: "Entidades pesca MC"
      },
	        {
        label: "Pescadores artesanais",
        layer: "Mun pescadores"
      },
      {
        label: "UCs Federais",
        layer: "UCs Federais"
      },
      {
        label: "UCs Estaduais",
        layer: "UCs Estaduais"
      },
      {
        label: "Áreas urbanizadas",
        layer: "Areas urbanizadas"
      }
    ];

    var submenus = {};

    function pushMenuItem(item, submenu) {
      var link = document.createElement("a");
      link.href = "#";
      link.className = "disable";
      link.textContent = item.label;
      link.layer = item.layer;
      link.submenu = submenu;

      if (submenu && !submenus[submenu.id]) {
        submenus[submenu.id] = {};
      }

      link.onclick = function (e) {
        var clickedLayer = this.layer;
        var submenu = this.submenu;
        e.preventDefault();
        e.stopPropagation();

        var visibility = map.getLayoutProperty(clickedLayer, "visibility");

        // toggle layer visibility by changing the layout object's visibility property
        if (visibility === "visible") {
          map.setLayoutProperty(clickedLayer, "visibility", "none");
          this.className = "";

          if (submenu) {
            delete submenus[submenu.id][clickedLayer];
          }
        } else {
          this.className = "active";
          map.setLayoutProperty(clickedLayer, "visibility", "visible");

          if (submenu) {
            submenus[submenu.id][clickedLayer] = true;
          }
        }
      };

      if (submenu) {
        let submenuEl = document.getElementById(submenu.id);

        if (!submenuEl) {
          var li = document.createElement('li');
          li.innerHTML = "<a href='#'>"+ submenu.label +"</a><ul class='submenu' id='"+ submenu.id +"'></ul>"

          document.getElementById('mySidebar')
            .appendChild(li);

          submenuEl = document.getElementById(submenu.id)
        }

        submenuEl
          .appendChild(
            document.createElement('li')
              .appendChild(link)
          );
      } else {
        document.getElementById('mySidebar')
          .appendChild(link);
      }
    }

    // set up the corresponding toggle button for each layer
    for (var i = 0; i < toggleableLayerIds.length; i++) {
      var item = toggleableLayerIds[i];

      if (item.hasOwnProperty('items')) {
        for (let subItem of item.items) {
          pushMenuItem(subItem, item);
        }
      } else {
        pushMenuItem(item);
      }
    }

    document.querySelectorAll('.sidebar li')
      .forEach(function (el) {
        el.addEventListener('mouseleave', function(e) {
          
          var submenu = e.target.getElementsByTagName('ul')[0];
          var submenuId = submenu.getAttribute('id');

          var keepVisible = Object.keys(submenus[submenuId]).length > 0;

          if (keepVisible) {
            submenu.classList.add('submenu-opened');
          } else {
            submenu.classList.remove('submenu-opened');
          }
        })
      });

    document.querySelectorAll('.sidebar li')
      .forEach(function(el) {
        el.addEventListener('mouseenter', function(e) {
          var submenu = e.target.getElementsByTagName('ul')[0];
          submenu.classList.add('submenu-opened');
        })
      });

    document.getElementById("openbtn").onclick = close;

    document.getElementById("openbtn").onclick = open;
    /* Set the width of the sidebar to 250px and the left margin of the page content to 250px */
    function close() {
      document.getElementById("openbtn").onclick = open;
      document.getElementById("mySidebar").style.width = "200px";
      document.getElementById("main").style.marginLeft = "200px";
    }

    /* Set the width of the sidebar to 0 and the left margin of the page content to 0 */
    function open() {
      document.getElementById("openbtn").onclick = close;
      document.getElementById("mySidebar").style.width = "0";
      document.getElementById("main").style.marginLeft = "0";
    }
    </script>
